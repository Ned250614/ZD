<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>回報管理系統</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f0e8; --bg2: #fffdf8; --bg3: #e8e0d0;
    --accent: #2563eb; --accent2: #1d4ed8;
    --text: #1e293b; --text2: #475569;
    --danger: #dc2626; --success: #16a34a; --warn: #d97706;
    --border: #d1c9b8; --shadow: 0 2px 12px rgba(0,0,0,.1);
    --cyan: #0891b2;
  }
  html { font-size: 16px; }
  body { font-family: 'Segoe UI','微軟正黑體',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

  /* ── Header ── */
  header { background:var(--bg2); border-bottom:2px solid var(--border); position:sticky; top:0; z-index:100; box-shadow:var(--shadow); }
  .header-inner { max-width:1300px; margin:0 auto; padding:10px 14px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .logo { font-size:17px; font-weight:700; color:var(--accent2); margin-right:auto; }
  .tabs { display:flex; gap:3px; flex-wrap:wrap; }
  .tab { padding:7px 12px; border-radius:6px; border:none; background:transparent; color:var(--text2); cursor:pointer; font-size:15px; font-weight:500; transition:all .2s; }
  .tab:hover { background:var(--bg3); color:var(--accent2); }
  .tab.active { background:var(--accent); color:#fff; font-weight:700; }
  .role-badge { padding:5px 10px; border-radius:20px; background:var(--accent); color:#fff; font-size:13px; font-weight:600; }
  .logout-btn { padding:6px 12px; border-radius:6px; border:1px solid var(--border); background:transparent; color:var(--text2); cursor:pointer; font-size:13px; }
  .logout-btn:hover { border-color:var(--accent); color:var(--accent); }
  main { max-width:1300px; margin:0 auto; padding:16px 12px; }

  /* ── Login ── */
  .login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; background:var(--bg); }
  .admin-corner-btn { position:fixed; top:14px; right:14px; padding:6px 14px; border-radius:6px; border:1px solid var(--border); background:var(--bg2); color:var(--text2); cursor:pointer; font-size:13px; transition:all .2s; z-index:200; }
  .admin-corner-btn:hover { border-color:var(--accent); color:var(--accent); }
  .login-center { display:flex; flex-direction:column; align-items:center; gap:24px; }
  .login-main-btn { background:var(--accent); color:#fff; border:none; border-radius:18px; padding:28px 72px; font-size:36px; font-weight:800; cursor:pointer; letter-spacing:8px; box-shadow:0 8px 24px rgba(37,99,235,.35); transition:all .2s; }
  .login-main-btn:hover { background:var(--accent2); transform:translateY(-2px); }
  .login-pw-box { display:flex; flex-direction:column; align-items:center; gap:10px; background:var(--bg2); border:1px solid var(--border); border-radius:12px; padding:20px 24px; min-width:260px; box-shadow:var(--shadow); }
  .login-pw-box .pw-label { font-size:15px; color:var(--text2); font-weight:500; }
  .login-pw-row { display:flex; gap:8px; }
  .login-error { color:var(--danger); font-size:14px; font-weight:600; }
  .admin-overlay { position:fixed; inset:0; background:rgba(0,0,0,.4); display:flex; align-items:center; justify-content:center; z-index:300; }
  .admin-modal { background:var(--bg2); border:1px solid var(--border); border-radius:14px; padding:28px 32px; display:flex; flex-direction:column; align-items:center; gap:14px; min-width:260px; box-shadow:var(--shadow); }
  .admin-modal h3 { color:var(--accent2); font-size:17px; font-weight:700; }
  .modal-close { align-self:flex-end; background:transparent; border:none; color:var(--text2); cursor:pointer; font-size:20px; margin-top:-8px; }

  /* ── Cards ── */
  .card { background:var(--bg2); border-radius:12px; padding:18px 16px; margin-bottom:16px; border:1px solid var(--border); box-shadow:var(--shadow); }
  .card-title { font-size:17px; font-weight:700; color:var(--accent2); margin-bottom:16px; }
  .section-label { font-size:13px; color:var(--text2); margin-bottom:6px; font-weight:600; text-transform:uppercase; letter-spacing:.4px; }

  /* ── Form Elements ── */
  input,select { background:#fff; border:1.5px solid var(--border); border-radius:6px; padding:9px 11px; color:var(--text); font-size:16px; outline:none; transition:border-color .2s; font-family:inherit; }
  input:focus,select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(37,99,235,.12); }
  select option { background:#fff; color:var(--text); }
  .error-msg { color:var(--danger); font-size:13px; margin-top:3px; font-weight:500; }

  /* ── Buttons ── */
  .btn { padding:9px 18px; border-radius:7px; border:none; cursor:pointer; font-size:15px; font-weight:600; transition:all .2s; white-space:nowrap; }
  .btn-primary { background:var(--accent); color:#fff; }
  .btn-primary:hover { background:var(--accent2); }
  .btn-secondary { background:var(--bg3); color:var(--accent2); border:1px solid var(--border); }
  .btn-secondary:hover { background:#ddd8cc; }
  .btn-danger { background:transparent; color:var(--danger); border:1.5px solid var(--danger); }
  .btn-danger:hover { background:rgba(220,38,38,.08); }
  .btn:disabled { opacity:.45; cursor:not-allowed; }

  /* ── Layout ── */
  .row { display:flex; gap:8px; align-items:flex-start; flex-wrap:wrap; margin-bottom:8px; }
  .row-center { align-items:center; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media(max-width:768px){ .grid2{ grid-template-columns:1fr; } }

  /* ── Table ── */
  .table-wrap { overflow:auto; -webkit-overflow-scrolling:touch; max-height:60vh; border:1px solid var(--border); border-radius:8px; }

  /* 桌機版 */
  table { width:100%; border-collapse:collapse; font-size:15px; }
  th { background:var(--bg3); padding:10px 12px; text-align:left; color:var(--accent2); font-weight:700; white-space:normal; word-break:keep-all; vertical-align:top; font-size:14px; border:1px solid var(--border); position:sticky; top:0; z-index:5; }
  td { padding:9px 10px; border:1px solid var(--border); color:var(--text); vertical-align:middle; font-size:15px; }
  tr:nth-child(even) td { background:rgba(0,0,0,.02); }

  .table-input { background:#fff; border:1.5px solid var(--border); border-radius:4px; padding:6px 6px; color:var(--text); font-size:16px; width:100%; min-width:60px; max-width:90px; outline:none; text-align:center; }
  .table-input:focus { border-color:var(--accent); box-shadow:0 0 0 2px rgba(37,99,235,.15); }
  .table-input.has-error { border-color:var(--danger); }

  /* ── 手機版 table ── */
  @media(max-width:600px){
    table { font-size:16px; }
    th { padding:8px 6px; font-size:13px; min-width:0; white-space:normal; word-break:break-all; line-height:1.3; top:0; }
    td { padding:8px 5px; font-size:16px; }
    .table-input { font-size:16px; padding:7px 4px; min-width:50px; max-width:72px; }
    .not-reported { font-size:13px; }
    .table-wrap { max-height:55vh; }
  }

  /* ── 合計（亮青）── */
  .th-total-wrap { margin-top:5px; border-top:1px solid rgba(8,145,178,.3); padding-top:4px; }
  .th-total-num { display:block; font-size:18px; font-weight:800; color:var(--cyan); line-height:1.1; }
  .th-total-label { display:block; font-size:10px; color:var(--cyan); opacity:.8; font-weight:500; margin-top:1px; letter-spacing:.6px; text-transform:uppercase; }

  /* ── Badges ── */
  .badge { display:inline-block; padding:2px 8px; border-radius:20px; font-size:12px; font-weight:600; }
  .badge-blue  { background:rgba(37,99,235,.12); color:var(--accent2); }
  .badge-green { background:rgba(22,163,74,.12); color:#15803d; }
  .not-reported { color:var(--danger); font-size:13px; font-weight:600; }

  /* ── Unreported ── */
  .unreported-box { background:rgba(217,119,6,.08); border:1px solid rgba(217,119,6,.3); border-radius:10px; padding:12px 16px; }
  .unreported-title { font-size:14px; font-weight:700; color:var(--warn); margin-bottom:8px; }
  .unreported-tags { display:flex; flex-wrap:wrap; gap:6px; }
  .unreported-tag { background:rgba(217,119,6,.12); color:var(--warn); border-radius:20px; padding:4px 12px; font-size:14px; font-weight:600; }

  /* ── 填寫回報 全螢幕覆蓋層 ── */
  .report-fullscreen {
    position: fixed; inset: 0; z-index: 200;
    background: var(--bg);
    display: flex; flex-direction: column;
  }
  .rfs-header {
    background: var(--accent); color: #fff;
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0; gap: 8px; flex-wrap: wrap;
  }
  .rfs-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .rfs-ym { font-size: 13px; opacity: .85; background: rgba(255,255,255,.2); border-radius: 20px; padding: 2px 10px; }
  .rfs-close { background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.4); color: #fff; border-radius: 6px; padding: 6px 14px; cursor: pointer; font-size: 14px; font-weight: 600; white-space: nowrap; }
  .rfs-close:hover { background: rgba(255,255,255,.35); }
  .rfs-body {
    flex: 1; overflow: auto; -webkit-overflow-scrolling: touch;
    padding: 0;
  }
  .rfs-table { width: 100%; border-collapse: collapse; font-size: 15px; }
  .rfs-table th { background: var(--bg3); padding: 10px 10px; text-align: center; color: var(--accent2); font-weight: 700; font-size: 13px; border: 1px solid var(--border); position: sticky; top: 0; z-index: 5; white-space: normal; word-break: break-all; line-height: 1.3; min-width: 60px; }
  .rfs-table th.rfs-th-name { text-align: left; min-width: 60px; max-width: 80px; }
  .rfs-table td { padding: 8px 6px; border: 1px solid var(--border); vertical-align: middle; text-align: center; }
  .rfs-table td.rfs-td-name { font-weight: 600; font-size: 15px; text-align: left; white-space: nowrap; }
  .rfs-table tr:nth-child(even) td { background: rgba(0,0,0,.02); }
  .rfs-footer {
    background: var(--bg2); border-top: 2px solid var(--border);
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .rfs-footer .btn { flex: 1; font-size: 16px; padding: 12px; }
  @media(max-width:600px){
    .rfs-table th { font-size: 12px; padding: 8px 5px; }
    .rfs-table td { padding: 7px 4px; font-size: 15px; }
    .rfs-table .table-input { max-width: 64px; font-size: 16px; }
    .rfs-td-name { font-size: 15px !important; }
  }

  .empty { color:var(--text2); text-align:center; padding:28px; font-size:16px; }
  .divider { height:1px; background:var(--border); margin:14px 0; }
  .alert { padding:12px 14px; border-radius:8px; font-size:15px; margin-bottom:12px; font-weight:500; }
  .alert-success { background:rgba(22,163,74,.1); color:#15803d; border:1px solid rgba(22,163,74,.3); }
  .alert-error   { background:rgba(220,38,38,.1); color:var(--danger); border:1px solid rgba(220,38,38,.3); }
  .loading { color:var(--text2); text-align:center; padding:24px; font-size:16px; }
  .sort-input { width:56px; background:#fff; border:1.5px solid var(--border); border-radius:4px; padding:5px 6px; color:var(--text); font-size:14px; text-align:center; }
  .ym-display { background:var(--accent); border-radius:8px; padding:9px 16px; color:#fff; font-weight:700; font-size:15px; display:inline-flex; align-items:center; gap:8px; }

  .view-top { display:flex; gap:12px; align-items:flex-start; flex-wrap:wrap; margin-bottom:16px; }
  .view-top-controls { display:flex; gap:8px; align-items:center; flex-wrap:wrap; flex:1; }
  .view-top-unreported { min-width:200px; max-width:320px; }

  /* ══ 填寫回報 全螢幕覆蓋層 ══ */
  .report-fullscreen {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 500;
    display: flex;
    flex-direction: column;
  }
  /* 頂部標題 */
  .rfs-header {
    background: var(--accent);
    color: #fff;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  .rfs-title { font-size: 16px; font-weight: 700; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .rfs-ym { font-size: 13px; opacity: .85; font-weight: 400; }
  .rfs-close { background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.4); color: #fff; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 14px; font-weight: 600; white-space:nowrap; }
  .rfs-close:hover { background: rgba(255,255,255,.35); }

  /* 可捲動表格區 */
  .rfs-body {
    flex: 1;
    overflow: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0;
  }
  .rfs-table { width: 100%; border-collapse: collapse; font-size: 15px; }
  .rfs-table thead { position: sticky; top: 0; z-index: 10; }
  .rfs-th-name { background: var(--bg3); padding: 10px 10px; font-weight: 700; color: var(--accent2); border: 1px solid var(--border); position:sticky; left:0; z-index:15; min-width:72px; font-size:14px; }
  .rfs-th-field { background: var(--bg3); padding: 10px 8px; font-weight: 700; color: var(--accent2); border: 1px solid var(--border); text-align:center; min-width:80px; font-size:14px; white-space:normal; word-break:break-all; line-height:1.3; }
  .rfs-td-name { padding: 9px 10px; border: 1px solid var(--border); font-weight: 700; font-size:16px; background: #fff; position:sticky; left:0; z-index:5; white-space:nowrap; color:var(--accent2); }
  .rfs-td-field { padding: 7px 6px; border: 1px solid var(--border); text-align:center; background: #fff; }
  .rfs-table tr:nth-child(even) .rfs-td-name,
  .rfs-table tr:nth-child(even) .rfs-td-field { background: #f8f5f0; }

  /* 固定底部儲存列 */
  .rfs-footer {
    flex-shrink: 0;
    background: #fff;
    border-top: 2px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 -2px 10px rgba(0,0,0,.1);
  }
  .rfs-save-btn { font-size: 17px; padding: 12px 32px; flex: 1; max-width: 280px; }
  .rfs-msg { font-size: 14px; font-weight: 600; }
  .rfs-msg-ok { color: var(--success); }
  .rfs-msg-err { color: var(--danger); }

  /* 手機版全螢幕調整 */
  @media(max-width:600px){
    .rfs-header { padding: 10px 12px; }
    .rfs-title { font-size: 15px; }
    .rfs-th-name, .rfs-th-field { font-size: 13px; padding: 8px 6px; }
    .rfs-td-name { font-size: 15px; padding: 8px 8px; }
    .rfs-td-field { padding: 6px 4px; }
    .rfs-save-btn { font-size: 16px; padding: 12px 20px; }
    .table-input { max-width: 68px; font-size: 16px; }
  }

  /* ── 手機版通用 ── */
  @media(max-width:600px){
    html { font-size:17px; }
    main { padding:12px 8px; }
    .card { padding:14px 12px; }
    .card-title { font-size:18px; }
    .btn { font-size:16px; padding:10px 16px; }
    input,select { font-size:17px; padding:10px 10px; }
    .tab { font-size:14px; padding:7px 10px; }
    .logo { font-size:16px; }
    .ym-display { font-size:15px; padding:8px 12px; }
    .login-main-btn { font-size:32px; padding:24px 56px; letter-spacing:6px; }
  }
</style>
</head>
<body>
<div id="app">

  <!-- Login -->
  <div v-if="!currentRole" class="login-screen">
    <button class="admin-corner-btn" @click="showAdminModal=true">管理者</button>
    <div v-if="showAdminModal" class="admin-overlay" @click.self="closeAdminModal">
      <div class="admin-modal">
        <button class="modal-close" @click="closeAdminModal">✕</button>
        <h3>🛠 管理者登入</h3>
        <div class="login-pw-row">
          <input type="password" placeholder="請輸入密碼" v-model="loginPw" @keydown.enter="doLogin('A')" style="width:190px" autofocus />
          <button class="btn btn-primary" @click="doLogin('A')" :disabled="loginLoading">{{ loginLoading?'...':'登入' }}</button>
        </div>
        <div v-if="loginError" class="login-error">{{ loginError }}</div>
      </div>
    </div>
    <div class="login-center">
      <button class="login-main-btn" @click="showReporterPw=!showReporterPw">回報</button>
      <div v-if="showReporterPw" class="login-pw-box">
        <div class="pw-label">請輸入密碼</div>
        <div class="login-pw-row">
          <input type="password" placeholder="填報密碼" v-model="loginPw" @keydown.enter="doLogin('B')" style="width:190px" autofocus />
          <button class="btn btn-primary" @click="doLogin('B')" :disabled="loginLoading">{{ loginLoading?'...':'進入' }}</button>
        </div>
        <div v-if="loginError" class="login-error">{{ loginError }}</div>
      </div>
    </div>
  </div>

  <!-- App -->
  <template v-else>
    <header>
      <div class="header-inner">
        <span class="logo">📋 回報管理系統</span>
        <div class="tabs">
          <button v-if="currentRole==='A'" class="tab" :class="{active:tab==='setup'}" @click="tab='setup'">⚙️ 設定</button>
          <button class="tab" :class="{active:tab==='report'}" @click="tab='report'">📝 填寫回報</button>
          <button class="tab" :class="{active:tab==='view'}" @click="tab='view'">📊 總覽</button>
          <button class="tab" :class="{active:tab==='history'}" @click="tab='history'">📅 歷史紀錄</button>
        </div>
        <span class="role-badge">{{ currentRole==='A'?'🛠 管理者':'📝 填報' }}</span>
        <button class="logout-btn" @click="logout">登出</button>
      </div>
    </header>

    <main>
      <div v-if="globalMsg" :class="['alert',globalMsg.type==='ok'?'alert-success':'alert-error']">{{ globalMsg.text }}</div>

      <!-- ══ 設定 ══ -->
      <div v-if="tab==='setup' && currentRole==='A'">
        <div class="card">
          <div class="card-title">📅 當前回報年月設定</div>
          <p style="color:var(--text2);font-size:14px;margin-bottom:16px">設定後，填報者與總覽頁面均以此年月為準。</p>
          <div class="row row-center">
            <span class="section-label" style="margin:0 6px 0 0">年份</span>
            <input v-model="activeYear" type="text" placeholder="例如 2025" style="width:100px" />
            <span class="section-label" style="margin:0 6px">月份</span>
            <select v-model="activeMonth" style="width:110px">
              <option v-for="(m,i) in months" :key="i+1" :value="i+1">{{ m }}</option>
            </select>
            <button class="btn btn-primary" @click="saveActiveYearMonth">儲存年月設定</button>
            <div v-if="activeYM" class="ym-display">目前設定：{{ activeYM.year }} 年 {{ months[activeYM.month-1] }}</div>
          </div>
        </div>

        <div class="card">
          <div class="card-title">🔑 密碼管理</div>
          <div class="grid2">
            <div>
              <div class="section-label">管理者密碼</div>
              <div class="row row-center">
                <input type="password" v-model="newPwAdmin" placeholder="輸入新密碼" style="flex:1" />
                <button class="btn btn-primary" @click="savePassword('admin')">儲存</button>
              </div>
            </div>
            <div>
              <div class="section-label">填報密碼</div>
              <div class="row row-center">
                <input type="password" v-model="newPwReporter" placeholder="輸入新密碼" style="flex:1" />
                <button class="btn btn-primary" @click="savePassword('reporter')">儲存</button>
              </div>
            </div>
          </div>
        </div>

        <div class="grid2">
          <div class="card">
            <div class="card-title">🏷 隊別管理</div>
            <div class="section-label">新增隊別</div>
            <div class="row row-center">
              <input v-model="newTeamName" placeholder="隊別名稱" @keydown.enter="addTeam" style="flex:1" />
              <button class="btn btn-primary" @click="addTeam">新增</button>
            </div>
            <div class="divider"></div>
            <div class="section-label">排序設定</div>
            <div v-if="teams.length===0" class="empty">尚無隊別</div>
            <div v-for="t in sortedTeams" :key="t.id" class="row row-center" style="margin-bottom:8px">
              <input class="sort-input" type="number" v-model.number="t.sort_order" @change="updateTeamSort(t)" min="0" />
              <span style="flex:1;font-weight:600">{{ t.name }}</span>
              <button class="btn btn-danger" style="padding:4px 10px;font-size:12px" @click="deleteTeam(t)">刪除</button>
            </div>
          </div>

<script>
const SUPABASE_URL  = 'https://rlnbmukmtmntawsxaqak.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJsbmJtdWttdG1udGF3c3hhcWFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxNjQxMjgsImV4cCI6MjA4OTc0MDEyOH0._TzXWV_l9ds07hdGfYqo9n3J8bP_NFmuyW6Ax_O0WbA';
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON);
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
function strokeSort(a,b){ return a.localeCompare(b,'zh-TW',{sensitivity:'base'}); }

// 欄位字母轉換（A=0, B=1 ...）
function colLetter(idx){ return String.fromCharCode(65 + idx); }

const { createApp, ref, computed, reactive } = Vue;

createApp({
  setup() {
    // ── Auth ──
    const currentRole=ref(null),loginPw=ref(''),loginError=ref(''),loginLoading=ref(false);
    const showAdminModal=ref(false),showReporterPw=ref(false);
    function closeAdminModal(){ showAdminModal.value=false; loginPw.value=''; loginError.value=''; }

    async function doLogin(role){
      if (!loginPw.value)return;
      loginLoading.value=true; loginError.value='';
      const pwKey=role==='A'?'password_admin':'password_reporter';
      const {data,error}=await db.from('settings').select('value').eq('key',pwKey).maybeSingle();
      if (error||!data){ loginError.value='無法取得密碼，請聯絡管理者'; loginLoading.value=false; return; }
      const storedPw=typeof data.value==='string'?data.value:String(data.value);
      if (loginPw.value===storedPw){
        currentRole.value=role; loginLoading.value=false;
        showAdminModal.value=false; showReporterPw.value=false;
        loginPw.value=''; loginError.value='';
        tab.value=role==='A'?'setup':'report';
        loadAll();
      } else { loginError.value='密碼錯誤，請再試一次'; loginLoading.value=false; }
    }
    function logout(){ currentRole.value=null; loginPw.value=''; loginError.value=''; showReporterPw.value=false; showAdminModal.value=false; }

    const tab=ref('setup'),globalMsg=ref(null),months=MONTHS;
    function showMsg(text,type='ok'){ globalMsg.value={text,type}; setTimeout(()=>globalMsg.value=null,3500); }

    // ── Data ──
    const teams=ref([]),groups=ref([]),titles=ref([]),members=ref([]),fields=ref([]);
    const sortedTeams  =computed(()=>[...teams.value].sort((a,b)=>a.sort_order-b.sort_order||strokeSort(a.name,b.name)));
    const sortedGroups =computed(()=>[...groups.value].sort((a,b)=>a.sort_order-b.sort_order||strokeSort(a.name,b.name)));
    const sortedTitles =computed(()=>[...titles.value].sort((a,b)=>a.sort_order-b.sort_order));
    const sortedFields =computed(()=>[...fields.value].sort((a,b)=>a.sort_order-b.sort_order));
    // 相容舊版 positive_integer 與新版 non_negative_integer
    function isNum(f){ return f.type==='non_negative_integer'||f.type==='positive_integer'; }
    const intFields    =computed(()=>sortedFields.value.filter(isNum));
    const sortedMembers=computed(()=>[...members.value].sort((a,b)=>{
      const td=(teams.value.find(x=>x.id===a.team_id)?.sort_order??999)-(teams.value.find(x=>x.id===b.team_id)?.sort_order??999); if(td)return td;
      const gd=(groups.value.find(x=>x.id===a.group_id)?.sort_order??999)-(groups.value.find(x=>x.id===b.group_id)?.sort_order??999); if(gd)return gd;
      const tid=(titles.value.find(x=>x.id===a.title_id)?.sort_order??999)-(titles.value.find(x=>x.id===b.title_id)?.sort_order??999); if(tid)return tid;
      return strokeSort(a.name,b.name);
    }));

    function teamName(id){ return teams.value.find(t=>t.id===id)?.name||'—'; }
    function groupName(id){ return groups.value.find(g=>g.id===id)?.name||'—'; }
    function titleName(id){ return titles.value.find(t=>t.id===id)?.name||'—'; }
    function groupsOfTeam(tid){ return tid?groups.value.filter(g=>g.team_id===tid):groups.value; }

    // ── 通用加總 ──
    function calcTotal(rows, fieldId){
      return rows.reduce((s,r)=>{ const v=parseInt(r.values?.[fieldId]??0); return s+(isNaN(v)?0:v); },0);
    }

    async function loadAll(){
      const [t,g,ti,m,f]=await Promise.all([
        db.from('teams').select('*'), db.from('groups').select('*'),
        db.from('titles').select('*'), db.from('members').select('*'), db.from('fields').select('*'),
      ]);
      teams.value=t.data||[]; groups.value=g.data||[]; titles.value=ti.data||[];
      members.value=m.data||[]; fields.value=f.data||[];
      await loadActiveYM();
    }

    // ── Active YM ──
    const activeYear=ref(String(new Date().getFullYear())),activeMonth=ref(new Date().getMonth()+1),activeYM=ref(null);
    async function loadActiveYM(){
      const {data}=await db.from('settings').select('*').eq('key','active_ym').maybeSingle();
      if (data?.value){ activeYM.value=data.value; activeYear.value=String(data.value.year); activeMonth.value=data.value.month; }
    }
    async function saveActiveYearMonth(){
      if (!activeYear.value){showMsg('請輸入年份','err');return;}
      const val={year:parseInt(activeYear.value),month:activeMonth.value};
      const {error}=await db.from('settings').upsert({key:'active_ym',value:val},{onConflict:'key'});
      if (error){showMsg('儲存失敗: '+error.message,'err');return;}
      activeYM.value=val; showMsg(`✅ 已設定回報年月為 ${val.year} 年 ${MONTHS[val.month-1]}`);
    }

    // ── Password ──
    const newPwAdmin=ref(''),newPwReporter=ref('');
    async function savePassword(type){
      const key=type==='admin'?'password_admin':'password_reporter';
      const pw=type==='admin'?newPwAdmin.value:newPwReporter.value;
      if (!pw.trim()){showMsg('密碼不可為空','err');return;}
      const {error}=await db.from('settings').upsert({key,value:pw},{onConflict:'key'});
      if (error){showMsg('儲存失敗: '+error.message,'err');return;}
      showMsg(`✅ ${type==='admin'?'管理者':'填報'}密碼已更新`);
      if (type==='admin')newPwAdmin.value='';else newPwReporter.value='';
    }

    // ── Teams/Groups/Titles/Members/Fields CRUD ──
    const newTeamName=ref('');
    async function addTeam(){
      if (!newTeamName.value.trim())return;
      const {data,error}=await db.from('teams').insert({name:newTeamName.value.trim(),sort_order:teams.value.length}).select().single();
      if (!error){teams.value.push(data);newTeamName.value='';}else showMsg('新增失敗: '+error.message,'err');
    }
    async function updateTeamSort(t){await db.from('teams').update({sort_order:t.sort_order}).eq('id',t.id);}
    async function deleteTeam(t){
      if (!confirm(`確定刪除隊別「${t.name}」？`))return;
      await db.from('teams').delete().eq('id',t.id);
      teams.value=teams.value.filter(x=>x.id!==t.id);
      groups.value=groups.value.filter(x=>x.team_id!==t.id);
      members.value=members.value.filter(x=>x.team_id!==t.id);
    }
    const newGroupName=ref(''),newGroupTeamId=ref('');
    async function addGroup(){
      if (!newGroupName.value.trim()||!newGroupTeamId.value)return;
      const {data,error}=await db.from('groups').insert({name:newGroupName.value.trim(),team_id:newGroupTeamId.value,sort_order:0}).select().single();
      if (!error){groups.value.push(data);newGroupName.value='';}else showMsg('新增失敗: '+error.message,'err');
    }
    async function updateGroupSort(g){await db.from('groups').update({sort_order:g.sort_order}).eq('id',g.id);}
    async function deleteGroup(g){
      if (!confirm(`確定刪除組別「${g.name}」？`))return;
      await db.from('groups').delete().eq('id',g.id);
      groups.value=groups.value.filter(x=>x.id!==g.id);
      members.value=members.value.filter(x=>x.group_id!==g.id);
    }
    async function updateTitleSort(t){await db.from('titles').update({sort_order:t.sort_order}).eq('id',t.id);}

    const newMember=reactive({name:'',team_id:'',group_id:'',title_id:''});
    async function addMember(){
      if (!newMember.name.trim()||!newMember.team_id||!newMember.group_id||!newMember.title_id){showMsg('請填寫所有欄位','err');return;}
      const {data,error}=await db.from('members').insert({name:newMember.name.trim(),team_id:newMember.team_id,group_id:newMember.group_id,title_id:newMember.title_id}).select().single();
      if (!error){members.value.push(data);Object.assign(newMember,{name:'',team_id:'',group_id:'',title_id:''});}else showMsg('新增失敗: '+error.message,'err');
    }
    async function deleteMember(m){
      if (!confirm(`確定刪除「${m.name}」？`))return;
      await db.from('members').delete().eq('id',m.id);
      members.value=members.value.filter(x=>x.id!==m.id);
    }
    async function importMembers(e){
      const file=e.target.files[0];if (!file)return;
      const buf=await file.arrayBuffer();
      const wb=XLSX.read(buf);const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1});
      const hdr=rows[0]?.map(h=>String(h).trim());
      const ni=hdr?.indexOf('姓名'),ti=hdr?.indexOf('隊別'),gi=hdr?.indexOf('組別'),tii=hdr?.indexOf('職稱');
      if (ni<0||ti<0||gi<0||tii<0){showMsg('Excel格式錯誤，請使用範本','err');return;}
      let added=0,failed=0;
      for (let i=1;i<rows.length;i++){
        const row=rows[i];const name=String(row[ni]||'').trim();if (!name)continue;
        const team=teams.value.find(t=>t.name===String(row[ti]||'').trim());
        const group=groups.value.find(g=>g.name===String(row[gi]||'').trim()&&g.team_id===team?.id);
        const title=titles.value.find(t=>t.name===String(row[tii]||'').trim());
        if (!team||!group||!title){failed++;continue;}
        const {data,error}=await db.from('members').insert({name,team_id:team.id,group_id:group.id,title_id:title.id}).select().single();
        if (!error){members.value.push(data);added++;}else failed++;
      }
      showMsg(`匯入完成：成功 ${added} 筆，失敗 ${failed} 筆`,added>0?'ok':'err');
      e.target.value='';
    }
    function downloadMemberTemplate(){
      const ws=XLSX.utils.aoa_to_sheet([['姓名','隊別','組別','職稱'],['王小明','第一隊','第一組','組員']]);
      const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'人員');
      XLSX.writeFile(wb,'人員匯入範本.xlsx');
    }
    const newField=reactive({name:'',type:'text',sort_order:0});
    async function addField(){
      if (!newField.name.trim())return;
      const {data,error}=await db.from('fields').insert({name:newField.name.trim(),type:newField.type,sort_order:newField.sort_order}).select().single();
      if (!error){fields.value.push(data);Object.assign(newField,{name:'',type:'text',sort_order:0});}else showMsg('新增失敗: '+error.message,'err');
    }
    async function updateFieldSort(f){await db.from('fields').update({sort_order:f.sort_order}).eq('id',f.id);}
    async function deleteField(f){
      if (!confirm(`確定刪除欄位「${f.name}」？`))return;
      await db.from('fields').delete().eq('id',f.id);
      fields.value=fields.value.filter(x=>x.id!==f.id);
    }

    // ── Report ──
    const reportFilterTeam=ref(''),reportFilterGroup=ref('');
    const reportConfirmed=ref(false),reportValues=ref({}),fieldErrors=ref({});
    const reportLoading=ref(false),submitLoading=ref(false);
    const reportGroupCount=computed(()=>groupsOfTeam(reportFilterTeam.value).length);

    function onReportTeamChange(){
      reportFilterGroup.value=''; reportConfirmed.value=false;
      const gs=groupsOfTeam(reportFilterTeam.value);
      if (gs.length===1) reportFilterGroup.value=gs[0].id;
    }
    const filteredReportMembers=computed(()=>{
      if (!reportConfirmed.value)return[];
      return sortedMembers.value.filter(m=>m.team_id===reportFilterTeam.value&&m.group_id===reportFilterGroup.value);
    });
    async function confirmAndLoad(){
      if (!activeYM.value){showMsg('管理者尚未設定回報年月','err');return;}
      reportConfirmed.value=true; reportLoading.value=true; fieldErrors.value={};
      const memberIds=members.value.filter(m=>m.team_id===reportFilterTeam.value&&m.group_id===reportFilterGroup.value).map(m=>m.id);
      const {data}=await db.from('reports').select('*')
        .eq('year',activeYM.value.year).eq('month',activeYM.value.month)
        .in('member_id',memberIds.length?memberIds:['__none__']);
      const vals={};
      (data||[]).forEach(r=>{
        const v=r.values||{};
        Object.keys(v).forEach(fid=>{ if(v[fid]!==null&&v[fid]!==undefined) vals[r.member_id+'_'+fid]=String(v[fid]); });
      });
      reportValues.value=vals; reportLoading.value=false;
    }
    function validateField(memberId,field){
      const key=memberId+'_'+field.id;
      const val=(reportValues.value[key]??'').trim();
      if (field.type==='non_negative_integer'&&val!==''){
        if (!/^\d+$/.test(val)||parseInt(val)<0) fieldErrors.value[key]='請輸入 0 或正整數';
        else delete fieldErrors.value[key];
      } else delete fieldErrors.value[key];
    }
    async function submitReport(){
      fieldErrors.value={}; let hasError=false;
      filteredReportMembers.value.forEach(m=>{
        sortedFields.value.forEach(f=>{
          const key=m.id+'_'+f.id; const val=(reportValues.value[key]??'').trim();
          if (f.type==='non_negative_integer'&&val!==''){
            if (!/^\d+$/.test(val)||parseInt(val)<0){fieldErrors.value[key]='請輸入 0 或正整數';hasError=true;}
          }
        });
      });
      if (hasError){showMsg('部分欄位格式有誤，請修正後再儲存','err');return;}
      submitLoading.value=true;
      const year=activeYM.value.year,month=activeYM.value.month;
      for (const m of filteredReportMembers.value){
        const values={};
        sortedFields.value.forEach(f=>{
          const key=m.id+'_'+f.id; const raw=(reportValues.value[key]??'').trim();
          if (raw!=='') values[f.id]=f.type==='non_negative_integer'?parseInt(raw):raw;
        });
        const {data:existing}=await db.from('reports').select('id')
          .eq('year',year).eq('month',month).eq('member_id',m.id).maybeSingle();
        if (existing){
          const {error}=await db.from('reports').update({values}).eq('id',existing.id);
          if (error){showMsg('儲存失敗: '+error.message,'err');submitLoading.value=false;return;}
        } else {
          const {error}=await db.from('reports').insert({
            year,month,member_id:m.id,member_name:m.name,
            team_name:teamName(m.team_id),group_name:groupName(m.group_id),
            title_name:titleName(m.title_id),values
          });
          if (error){showMsg('儲存失敗: '+error.message,'err');submitLoading.value=false;return;}
        }
      }
      submitLoading.value=false; showMsg('✅ 儲存成功！');
    }

    // ── View ──
    const viewFilterTeam=ref(''),viewFilterGroup=ref('');
    const viewReports=ref([]),viewLoading=ref(false),viewLoaded=ref(false);
    const filteredViewReports=computed(()=>viewReports.value.filter(r=>
      (!viewFilterTeam.value||r.team_name===teamName(viewFilterTeam.value))&&
      (!viewFilterGroup.value||r.group_name===groupName(viewFilterGroup.value))
    ));
    const unreportedList=computed(()=>{
      if (!viewLoaded.value) return [];
      const result=[];
      sortedTeams.value.forEach(team=>{
        const teamGroups=sortedGroups.value.filter(g=>g.team_id===team.id);
        if (!members.value.some(m=>m.team_id===team.id)) return;
        const unreportedGroups=teamGroups.filter(g=>{
          if (!members.value.some(m=>m.group_id===g.id)) return false;
          return !viewReports.value.some(r=>r.group_name===g.name&&r.team_name===team.name);
        });
        if (unreportedGroups.length===0) return;
        if (teamGroups.length===1) result.push({key:team.id,label:team.name});
        else result.push({key:team.id,label:`${team.name}的${unreportedGroups.map(g=>g.name).join('／')}`});
      });
      return result;
    });
    async function loadViewData(){
      if (!activeYM.value){showMsg('管理者尚未設定回報年月','err');return;}
      viewLoading.value=true; viewLoaded.value=false;
      const {data}=await db.from('reports').select('*').eq('year',activeYM.value.year).eq('month',activeYM.value.month);
      viewReports.value=sortReports(data||[]); viewLoading.value=false; viewLoaded.value=true;
    }

    // ── Excel 匯出（含 SUM 公式）──
    function buildExcelWithFormulas(data, fixedHeaders, getFixedCols, sheetName, filename){
      const fieldCols = sortedFields.value; // 動態欄位
      const headerRow = [...fixedHeaders, ...fieldCols.map(f=>f.name)];
      const dataRows  = data.map(r=>[...getFixedCols(r), ...fieldCols.map(f=>r.values?.[f.id]??'')]);
      const totalRowNum = dataRows.length + 2; // 1-indexed: row1=header, row2..N=data, rowN+1=total
      const fixedCount  = fixedHeaders.length;

      // 建立合計列：文字欄位空白，數字欄位用 SUM 公式
      const totalRow = fixedHeaders.map((h,i)=> i===0 ? '合計' : '');
      fieldCols.forEach((f, fi)=>{
        const colIdx = fixedCount + fi;            // 0-based
        const col    = colLetter(colIdx);           // e.g. "D"
        if (isNum(f)){
          // SUM(D2:D{N})
          totalRow.push({ f: `SUM(${col}2:${col}${totalRowNum-1})` });
        } else {
          totalRow.push('');
        }
      });

      const allRows = [headerRow, ...dataRows, totalRow];
      const ws = XLSX.utils.aoa_to_sheet(allRows);

      // 加粗合計列（選用，設定字型）
      const totalRowIdx = allRows.length - 1; // 0-based
      fieldCols.forEach((f, fi)=>{
        if (isNum(f)){
          const colIdx = fixedCount + fi;
          const cellRef = colLetter(colIdx) + totalRowNum;
          if (ws[cellRef]) ws[cellRef].s = { font:{ bold:true } };
        }
      });

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
      XLSX.writeFile(wb, filename);
    }

    function exportView(){
      if (!activeYM.value||filteredViewReports.value.length===0) return;
      buildExcelWithFormulas(
        filteredViewReports.value,
        ['隊別','組別','姓名'],
        r=>[r.team_name, r.group_name, r.member_name],
        '總覽',
        `總覽_${activeYM.value.year}_${MONTHS[activeYM.value.month-1]}.xlsx`
      );
    }

    // ── History ──
    const histYear=ref(''),histMonth=ref(''),histFilterTeam=ref(''),histFilterGroup=ref('');
    const histReports=ref([]),histLoading=ref(false);
    async function loadHistory(){
      histLoading.value=true;
      let q=db.from('reports').select('*');
      if (histYear.value) q=q.eq('year',parseInt(histYear.value));
      if (histMonth.value) q=q.eq('month',histMonth.value);
      const {data}=await q; let res=data||[];
      if (histFilterTeam.value) res=res.filter(r=>r.team_name===teamName(histFilterTeam.value));
      if (histFilterGroup.value) res=res.filter(r=>r.group_name===groupName(histFilterGroup.value));
      histReports.value=sortReports(res); histLoading.value=false;
    }
    function exportHistory(){
      if (histReports.value.length===0) return;
      buildExcelWithFormulas(
        histReports.value,
        ['年份','月份','隊別','組別','職稱','姓名'],
        r=>[r.year, MONTHS[r.month-1], r.team_name, r.group_name, r.title_name||'', r.member_name],
        '歷史紀錄',
        `歷史_${histYear.value||'全部'}_${histMonth.value?MONTHS[histMonth.value-1]:'全月'}.xlsx`
      );
    }

    function sortReports(data){
      return [...data].sort((a,b)=>{
        const ta=sortedTeams.value.findIndex(t=>t.name===a.team_name),tb=sortedTeams.value.findIndex(t=>t.name===b.team_name); if(ta!==tb)return ta-tb;
        const ga=sortedGroups.value.findIndex(g=>g.name===a.group_name),gb=sortedGroups.value.findIndex(g=>g.name===b.group_name); if(ga!==gb)return ga-gb;
        const tia=sortedTitles.value.findIndex(t=>t.name===a.title_name),tib=sortedTitles.value.findIndex(t=>t.name===b.title_name); if(tia!==tib)return tia-tib;
        return strokeSort(a.member_name||'',b.member_name||'');
      });
    }

    return {
      currentRole,loginPw,loginError,loginLoading,
      showAdminModal,showReporterPw,closeAdminModal,doLogin,logout,
      tab,globalMsg,months,
      teams,groups,titles,members,fields,
      sortedTeams,sortedGroups,sortedTitles,sortedFields,sortedMembers,intFields,
      teamName,groupName,titleName,groupsOfTeam,calcTotal,isNum,
      activeYear,activeMonth,activeYM,saveActiveYearMonth,
      newPwAdmin,newPwReporter,savePassword,
      newTeamName,addTeam,updateTeamSort,deleteTeam,
      newGroupName,newGroupTeamId,addGroup,updateGroupSort,deleteGroup,updateTitleSort,
      newMember,addMember,deleteMember,importMembers,downloadMemberTemplate,
      newField,addField,updateFieldSort,deleteField,
      reportFilterTeam,reportFilterGroup,reportConfirmed,reportGroupCount,
      reportValues,fieldErrors,reportLoading,submitLoading,
      filteredReportMembers,onReportTeamChange,confirmAndLoad,validateField,submitReport,
      viewFilterTeam,viewFilterGroup,
      viewReports,viewLoading,viewLoaded,filteredViewReports,unreportedList,
      loadViewData,exportView,
      histYear,histMonth,histFilterTeam,histFilterGroup,
      histReports,histLoading,loadHistory,exportHistory,
    };
  }
}).mount('#app');
</script>
</body>
